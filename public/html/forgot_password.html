<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — PhotoConcern</title>
  <meta name="description" content="Reset your PhotoConcern account password securely.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/login.css">
  <style>
    .fp-card {
      max-width: 420px;
      margin: 60px auto;
      padding: 36px 32px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }
    .fp-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; color: #021024; }
    .fp-sub   { font-size: 0.88rem; color: #6b7280; margin-bottom: 24px; }
    .fp-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .fp-field label { font-size: 0.82rem; font-weight: 600; color: #374151; }
    .fp-field input {
      height: 46px; padding: 0 14px; border-radius: 10px;
      border: 1px solid rgba(2,16,36,0.15); background: #f9fafb;
      font-size: 0.92rem; font-family: inherit; outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .fp-field input:focus {
      border-color: #5483B3;
      box-shadow: 0 0 0 3px rgba(84,131,179,0.18);
    }
    .fp-btn {
      width: 100%; height: 48px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #021024, #5483B3);
      color: #fff; font-size: 0.92rem; font-weight: 700;
      font-family: inherit; cursor: pointer; margin-top: 4px;
      transition: opacity 0.15s ease;
    }
    .fp-btn:hover    { opacity: 0.88; }
    .fp-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .fp-error { font-size: 0.82rem; color: #ef4444; min-height: 18px; margin-bottom: 4px; }
    .fp-success { font-size: 0.82rem; color: #16a34a; min-height: 18px; margin-bottom: 4px; }
    .fp-back { display: block; text-align: center; margin-top: 18px; font-size: 0.82rem; color: #6b7280; text-decoration: none; }
    .fp-back:hover { color: #021024; }
    .step { display: none; }
    .step.active { display: block; }
  </style>
</head>
<body style="background: linear-gradient(135deg,#f5f8fc,#eef3f9); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">

  <div class="fp-card">

    <!-- STEP 1: Enter email -->
    <div class="step active" id="step1">
      <h2 class="fp-title">Forgot Password</h2>
      <p class="fp-sub">Enter your email and we'll send you a 6-digit OTP.</p>
      <div class="fp-field">
        <label for="fpEmail">Email Address</label>
        <input type="email" id="fpEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <p class="fp-error" id="step1Error"></p>
      <button class="fp-btn" id="sendOtpBtn">Send OTP</button>
      <a href="/login" class="fp-back">← Back to login</a>
    </div>

    <!-- STEP 2: Enter OTP -->
    <div class="step" id="step2">
      <h2 class="fp-title">Enter OTP</h2>
      <p class="fp-sub" id="otpSubtitle">We sent a 6-digit code to your email.</p>
      <div class="fp-field">
        <label for="fpOtp">OTP Code</label>
        <input type="text" id="fpOtp" placeholder="123456" maxlength="6" inputmode="numeric">
      </div>
      <p class="fp-error" id="step2Error"></p>
      <button class="fp-btn" id="verifyOtpBtn">Verify OTP</button>
      <a href="#" class="fp-back" id="resendOtp">Resend OTP</a>
    </div>

    <!-- STEP 3: New password -->
    <div class="step" id="step3">
      <h2 class="fp-title">New Password</h2>
      <p class="fp-sub">Choose a strong new password.</p>
      <div class="fp-field">
        <label for="fpNewPass">New Password</label>
        <input type="password" id="fpNewPass" placeholder="••••••••">
      </div>
      <div class="fp-field">
        <label for="fpConfirmPass">Confirm Password</label>
        <input type="password" id="fpConfirmPass" placeholder="••••••••">
      </div>
      <p class="fp-error" id="step3Error"></p>
      <button class="fp-btn" id="resetPassBtn">Reset Password</button>
    </div>

  </div>

  <script>
    let userEmail = "";
    let resetToken = "";

    function showStep(n) {
      document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
      document.getElementById(`step${n}`).classList.add("active");
    }

    // STEP 1 — send OTP
    document.getElementById("sendOtpBtn").addEventListener("click", async () => {
      const email = document.getElementById("fpEmail").value.trim();
      const errEl = document.getElementById("step1Error");
      const btn   = document.getElementById("sendOtpBtn");
      errEl.textContent = "";

      if (!email) { errEl.textContent = "Please enter your email."; return; }

      btn.disabled = true; btn.textContent = "Sending…";

      try {
        const res  = await fetch("/api/forgot-password/send-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();

        if (!res.ok) { errEl.textContent = data.message; btn.disabled = false; btn.textContent = "Send OTP"; return; }

        userEmail = email;
        document.getElementById("otpSubtitle").textContent = `We sent a 6-digit code to ${email}.`;
        showStep(2);
      } catch (e) {
        errEl.textContent = "Something went wrong.";
        btn.disabled = false; btn.textContent = "Send OTP";
      }
    });

    // STEP 2 — verify OTP
    document.getElementById("verifyOtpBtn").addEventListener("click", async () => {
      const otp   = document.getElementById("fpOtp").value.trim();
      const errEl = document.getElementById("step2Error");
      const btn   = document.getElementById("verifyOtpBtn");
      errEl.textContent = "";

      if (!otp) { errEl.textContent = "Please enter the OTP."; return; }

      btn.disabled = true; btn.textContent = "Verifying…";

      try {
        const res  = await fetch("/api/forgot-password/verify-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: userEmail, otp }),
        });
        const data = await res.json();

        if (!res.ok) { errEl.textContent = data.message; btn.disabled = false; btn.textContent = "Verify OTP"; return; }

        resetToken = data.resetToken;
        showStep(3);
      } catch (e) {
        errEl.textContent = "Something went wrong.";
        btn.disabled = false; btn.textContent = "Verify OTP";
      }
    });

    // resend OTP
    document.getElementById("resendOtp").addEventListener("click", async (e) => {
      e.preventDefault();
      document.getElementById("step2Error").textContent = "Resending…";
      await fetch("/api/forgot-password/send-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: userEmail }),
      });
      document.getElementById("step2Error").textContent = "New OTP sent.";
      document.getElementById("step2Error").style.color = "#16a34a";
    });

    // STEP 3 — reset password
    document.getElementById("resetPassBtn").addEventListener("click", async () => {
      const newPass     = document.getElementById("fpNewPass").value;
      const confirmPass = document.getElementById("fpConfirmPass").value;
      const errEl       = document.getElementById("step3Error");
      const btn         = document.getElementById("resetPassBtn");
      errEl.textContent = "";

      if (!newPass)              { errEl.textContent = "Please enter a new password."; return; }
      if (newPass !== confirmPass) { errEl.textContent = "Passwords do not match."; return; }
      if (newPass.length < 6)    { errEl.textContent = "Password must be at least 6 characters."; return; }

      btn.disabled = true; btn.textContent = "Resetting…";

      try {
        const res  = await fetch("/api/forgot-password/reset", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: userEmail, resetToken, newPassword: newPass }),
        });
        const data = await res.json();

        if (!res.ok) { errEl.textContent = data.message; btn.disabled = false; btn.textContent = "Reset Password"; return; }

        // success — redirect to login
        window.location.href = "/login";
      } catch (e) {
        errEl.textContent = "Something went wrong.";
        btn.disabled = false; btn.textContent = "Reset Password";
      }
    });
  </script>
</body>
</html>
