<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — PhotoConcern</title>
  <link rel="stylesheet" href="/css/admin_dashboard.css">
</head>
<body>

  <div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-name">PhotoConcern</span>
        <span class="brand-badge">Admin</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-tab="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
          Active Orders
        </button>
        <button class="nav-item" data-tab="history">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
          Order History
        </button>
        <button class="nav-item" data-tab="users">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Users
        </button>
        <button class="nav-item" data-tab="contacts">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 5h18v12H7l-4 4z"/><path d="M7 9h10M7 13h7"/></svg>
          Messages
        </button>
      </nav>
      <button class="sidebar-logout" id="adminLogoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

      <!-- ACTIVE ORDERS TAB -->
      <section class="tab-panel active" id="tab-active">
        <div class="panel-header">
          <h2>Active Orders</h2>
          <span class="badge" id="activeCount">0</span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
                <th>Payment</th>
                <th>Date</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="activeOrdersBody">
              <tr><td colspan="7" class="loading-row">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- ORDER HISTORY TAB -->
      <section class="tab-panel" id="tab-history">
        <div class="panel-header">
          <h2>Order History</h2>
          <div class="filter-row">
            <select id="categoryFilter" class="filter-select">
              <option value="">All Categories</option>
              <option value="custom">Custom</option>
              <option value="sports">Sports</option>
              <option value="events">Events</option>
              <option value="office">Office</option>
            </select>
            <select id="statusFilter" class="filter-select">
              <option value="">All Statuses</option>
              <option value="placed">Placed</option>
              <option value="processing">Processing</option>
              <option value="delivered">Delivered</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
                <th>Payment</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="historyOrdersBody">
              <tr><td colspan="7" class="loading-row">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- USERS TAB -->
      <section class="tab-panel" id="tab-users">
        <div class="panel-header">
          <h2>Users</h2>
          <span class="badge" id="usersCount">0</span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Phone</th>
                <th>Joined</th>
              </tr>
            </thead>
            <tbody id="usersBody">
              <tr><td colspan="5" class="loading-row">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- CONTACTS TAB -->
      <section class="tab-panel" id="tab-contacts">
        <div class="panel-header">
          <h2>Contact Messages</h2>
          <span class="badge" id="contactsCount">0</span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Subject</th>
                <th>Message</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="contactsBody">
              <tr><td colspan="5" class="loading-row">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <!-- MOBILE BOTTOM NAV -->
  <nav class="mobile-nav" id="mobileNav">
    <button class="mobile-nav-btn active" data-tab="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
      Active
    </button>
    <button class="mobile-nav-btn" data-tab="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
      History
    </button>
    <button class="mobile-nav-btn" data-tab="users">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      Users
    </button>
    <button class="mobile-nav-btn" data-tab="contacts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 5h18v12H7l-4 4z"/></svg>
      Messages
    </button>
  </nav>

  <!-- ORDER DETAIL POPUP -->
  <div class="popup-overlay" id="orderPopup" hidden>
    <div class="popup-card">
      <div class="popup-head">
        <h3 id="popupOrderId">Order Details</h3>
        <button class="popup-close" id="popupClose">✕</button>
      </div>
      <div class="popup-body" id="popupBody"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="/js/admin_dashboard.js"></script>
</body>
</html>
