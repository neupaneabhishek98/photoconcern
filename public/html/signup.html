<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — PhotoConcern</title>
    <meta name="description" content="Join PhotoConcern Nepal. Create a free account as a customer, studio or freelancer.">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/signup.css">
    <script src="https://accounts.google.com/gsi/client?hl=en" async defer></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="/resources/logo_main.webp?v=20260530-2" alt="PhotoConcern" class="auth-logo">
                <h1>Create Account</h1>
                <p>Join us and start shopping</p>
            </div>

            <form id="registerForm" class="auth-form" action="/api/register" method="post">

                <!-- Account Type -->
                <div class="form-field">
                    <label for="account_type">Account Type</label>
                    <select id="account_type" name="role">
                        <option value="customer" selected>Customer</option>
                        <option value="studio">Studio</option>
                        <option value="freelancer">Freelancer</option>
                    </select>
                </div>

                <!-- Customer Form -->
                <div class="customerForm">
                    <div class="form-field">
                        <label for="full_name1">Full Name</label>
                        <input id="full_name1" type="text" placeholder="Your full name" name="full_name">
                    </div>
                    <div class="form-field">
                        <label for="email_address1">Email Address</label>
                        <input id="email_address1" type="email" placeholder="you@example.com" name="email_address">
                    </div>
                    <div class="form-field">
                        <label for="phone">Phone Number</label>
                        <input id="phone" type="text" placeholder="98XXXXXXXX" name="phone">
                    </div>
                    <div class="form-field">
                        <label for="password1">Password</label>
                        <input id="password1" data-pair="1" type="password" placeholder="••••••••" name="password">
                    </div>
                    <div class="form-field">
                        <label for="password2">Confirm Password</label>
                        <input id="password2" data-pair="1" type="password" placeholder="••••••••">
                    </div>
                </div>

                <!-- Studio Form -->
                <div class="studioForm" style="display:none">
                    <div class="form-field">
                        <label for="studio_name">Business Name</label>
                        <input id="studio_name" type="text" placeholder="Registered Studio Name" name="studio_name">
                    </div>
                    <div class="form-field">
                        <label for="studio_email">Business Email</label>
                        <input id="studio_email" type="email" placeholder="studio@example.com" name="studio_email">
                    </div>
                    <div class="form-field">
                        <label for="studio_phone">Phone Number</label>
                        <input id="studio_phone" type="text" placeholder="98XXXXXXXX" name="studio_phone">
                    </div>
                    <div class="form-field">
                        <label for="studio_pan">PAN Number</label>
                        <input id="studio_pan" type="text" placeholder="9-digit PAN" name="studio_pan">
                    </div>
                    <div class="form-field">
                        <label for="studio_location">Business Location</label>
                        <input id="studio_location" type="text" placeholder="City, Street" name="studio_location">
                    </div>
                    <div class="form-field">
                        <label for="studio_pass1">Password</label>
                        <input id="studio_pass1" data-pair="2" type="password" placeholder="••••••••" name="studio_password">
                    </div>
                    <div class="form-field">
                        <label for="studio_pass2">Confirm Password</label>
                        <input id="studio_pass2" data-pair="2" type="password" placeholder="••••••••">
                    </div>
                </div>

                <!-- Freelancer Form -->
                <div class="freelancerForm" style="display:none">
                    <div class="form-field">
                        <label for="free_name">Full Name / Brand Name</label>
                        <input id="free_name" type="text" placeholder="Your Name" name="free_name">
                    </div>
                    <div class="form-field">
                        <label for="free_email">Email</label>
                        <input id="free_email" type="email" placeholder="email@example.com" name="free_email">
                    </div>
                    <div class="form-field">
                        <label for="free_phone">Phone Number</label>
                        <input id="free_phone" type="text" placeholder="98XXXXXXXX" name="free_phone">
                    </div>
                    <div class="form-field">
                        <label for="free_pan">PAN Number</label>
                        <input id="free_pan" type="text" placeholder="9-digit PAN" name="free_pan">
                    </div>
                    <div class="form-field">
                        <label for="free_location">Location (Optional)</label>
                        <input id="free_location" type="text" placeholder="City (Optional)" name="free_location">
                    </div>
                    <div class="form-field">
                        <label for="free_pass1">Password</label>
                        <input id="free_pass1" data-pair="3" type="password" placeholder="••••••••" name="free_password">
                    </div>
                    <div class="form-field">
                        <label for="free_pass2">Confirm Password</label>
                        <input id="free_pass2" data-pair="3" type="password" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="auth-btn">Create Account</button>
            </form>

            <div class="auth-divider"><span>or</span></div>

            <button type="button" id="googleSignInBtn" class="google-btn">
                <svg class="google-icon" viewBox="0 0 533.5 544.3" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#4285F4" d="M533.5 278.4c0-17.5-1.5-34.5-4.3-51H272v96.7h146.9c-6.3 33.8-25.5 62.5-54.4 81.8v67h87.9c51.4-47.4 80.1-117.3 80.1-194.5z"/>
                    <path fill="#34A853" d="M272 544.3c73.6 0 135.4-24.5 180.6-66.3l-87.9-67c-24.4 16.3-55.7 25.8-92.7 25.8-71.2 0-131.5-48-153.1-112.7h-89.8v70.9c45.8 91.3 140.5 150.3 242.9 150.3z"/>
                    <path fill="#FBBC05" d="M118.2 325.1c-10.7-31.3-10.7-64.8 0-96.1V158.1h-89.8c-39.8 77.2-39.8 169.5 0 246.7l89.8-70.9z"/>
                    <path fill="#e70000" d="M272 107.3c38.2-0.6 75.1 13.8 103 40.9l77.1-77.1C404.8 24.7 342.9-0.3 272 0 169.6 0 74.9 59 29.1 150.3l89.8 70.9C140.5 155.3 200.8 107.3 272 107.3z"/>
                </svg>
                Continue with Google
            </button>

            <div class="auth-footer">
                <span>Already have an account?</span>
                <a href="/login">Sign In</a>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="/js/signup.js"></script>
    <script src="/js/google-auth.js"></script>
</body>
</html>
