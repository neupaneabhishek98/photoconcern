<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — PhotoConcern</title>
    <meta name="description" content="Sign in to your PhotoConcern account to shop, track orders and manage your profile.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/login.css">
    <script src="https://accounts.google.com/gsi/client?hl=en" async defer></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="/resources/main.webp" alt="PhotoConcern" class="auth-logo">
                <h1>Welcome Back</h1>
                <p>Sign in to continue shopping</p>
            </div>

            <form action="/api/login" method="post" class="auth-form">
                <div class="form-field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email_address" placeholder="you@example.com" required>
                </div>

                <div class="form-field">
                    <div class="label-row">
                        <label for="password">Password</label>
                        <a href="/forgot-password" class="forgot-link">Forgot?</a>
                    </div>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn">Sign In</button>
            </form>

            <div class="auth-divider"><span>or</span></div>

            <button type="button" id="googleSignInBtn" class="google-btn">
                <svg class="google-icon" viewBox="0 0 533.5 544.3" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#4285F4" d="M533.5 278.4c0-17.5-1.5-34.5-4.3-51H272v96.7h146.9c-6.3 33.8-25.5 62.5-54.4 81.8v67h87.9c51.4-47.4 80.1-117.3 80.1-194.5z"/>
                    <path fill="#34A853" d="M272 544.3c73.6 0 135.4-24.5 180.6-66.3l-87.9-67c-24.4 16.3-55.7 25.8-92.7 25.8-71.2 0-131.5-48-153.1-112.7h-89.8v70.9c45.8 91.3 140.5 150.3 242.9 150.3z"/>
                    <path fill="#FBBC05" d="M118.2 325.1c-10.7-31.3-10.7-64.8 0-96.1V158.1h-89.8c-39.8 77.2-39.8 169.5 0 246.7l89.8-70.9z"/>
                    <path fill="#EA4335" d="M272 107.3c38.2-0.6 75.1 13.8 103 40.9l77.1-77.1C404.8 24.7 342.9-0.3 272 0 169.6 0 74.9 59 29.1 150.3l89.8 70.9C140.5 155.3 200.8 107.3 272 107.3z"/>
                </svg>
                Continue with Google
            </button>

            <div class="auth-footer">
                <span>Don't have an account?</span>
                <a href="/signup">Create Account</a>
            </div>
        </div>
    </div>
    <div id="toast-container"></div>
    <script src="/js/login.js"></script>
    <script src="/js/google-auth.js"></script>
</body>
</html>
