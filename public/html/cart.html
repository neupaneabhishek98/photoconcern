<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart — LuckyGroup</title>
    <meta name="description" content="Review your cart and checkout securely at LuckyGroup Nepal.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/cart.css">
</head>
<body>
  <div data-pc-header></div>
<div class="main-cart-wrapper">


    <div class="cart-container">
        <div class="text-cart">
            <h2>My Cart</h2>
        </div>
        <div class="cart-products">
            <div class="cart-product">
                <div class="details-product">

                    <div class="img-product">
                        <img src="/resources/sublimation_cup.webp" alt="Product Image">
                    </div>
                    

                        <div class="details">
                            <h3>Product Name</h3>
                            <p>Rs.5,999 each</p>
                        </div>
                        <div class="delete-product">
                            <svg fill="none" stroke="#000" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </div>
                    
                </div>
                <div class="add-item">
                    <div class="quantity">
                        <button class="decrease">-</button>
                        <span class="quantity-value">1</span>
                        <button class="increase">+</button>
                    </div>
                </div>
                <div class="total">
                    <h3>Total: $99.99</h3>
                    
                </div>

            </div>
        </div>
    </div>
</div>
<div class="checkout-box">
  <h2 class="checkout-title">Order Summary</h2>
  
  <div class="checkout-items">
    <!-- Items from localStorage will appear here -->
  </div>

  <div class="summary">
    <div class="summary-line">
      <span class="label">Subtotal</span>
      <span class="value" id="subtotal">Rs.0</span>
    </div>
    <div class="summary-line">
      <span class="label">Shipping</span>
      <span class="value">Free</span>
    </div>
    <div class="summary-line">
      <span class="label">Tax</span>
      <span class="value" id="tax">Rs.0</span>
    </div>
    <br>
    <div class="summary-line total-line">
      <span>Total</span>
      <span id="total">Rs.0</span>
    </div>
  </div>

  <div class="checkout-buttons">
    <button id="proceed-checkout">Proceed to Checkout</button>
    <button id="continue-shopping">Continue Shopping</button>
  </div>
</div>
</div>




<div id="popup" class="popup">
  <div class="popup-content">
    <p id="popup-message">Message</p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/layout.js"></script>
  <script src="/js/layout.js"></script><script src="/js/theme.js"></script><script src="/js/navbar.js"></script>
<script src="/js/logout.js"></script>
</body>
<script src="/js/cart.js"></script>
</html>
