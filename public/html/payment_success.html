<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — LuckyGroup</title>
<meta name="description" content="Your order has been placed successfully. Thank you for shopping with LuckyGroup Nepal.">
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="/css/theme.css">
<link rel="stylesheet" href="/css/payment_success.css">
</head>
<body>
  <!-- Play sound -->
   <!-- Audio -->
 <audio id="success-sound" preload="auto">
  <source src="/resources/ding.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

  <div data-pc-header></div>

  <!-- Payment Success Content -->
  <div class="container">
    <div class="success-circle">
      <div class="checkmark"></div>
    </div>
    <div class="text-h1"><h1>
        Payment Successful
    </h1>
    <p>Thank you for your purchase!</p>

    </div>
  </div>

  <!-- Details -->
   <div class="order-card">
  <div class="order-row">
    <span>Order Number</span>
    <span class="bold-text" id="orderNumber">—</span>
  </div>
  <div class="order-row">
    <span>Order Date</span>
    <span class="bold-text" id="orderDate">—</span>
  </div>
  <div class="order-row">
    <span>Payment</span>
    <span class="bold-text" id="paymentMethod">—</span>
  </div>
  <div class="order-row">
    <span>Total</span>
    <span class="bold-text" id="orderTotal">—</span>
  </div>

  <div class="order-info-block no-border">
    <div class="info-label">
       <span class="icon">📦</span> Estimated Delivery
    </div>
    <div class="info-value" id="estimatedDelivery">—</div>
  </div>
</div>

<div class="lower-version">
    <a id="viewOrderBtn" href="/orders" class="btn btn-primary">View Order Details <span>→</span></a>
    <button class="btn btn-secondary" onclick="window.location.href='/'">Continue Shopping</button>
    <p class="support-text">Need help? <a href="/serve/contact">Contact Support</a></p>
</div>








</body>
<script src="/js/layout.js"></script>
  <script src="/js/layout.js"></script><script src="/js/theme.js"></script><script src="/js/navbar.js"></script>

</html>
